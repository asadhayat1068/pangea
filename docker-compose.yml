services:
  postgres:
    image: postgres:16-alpine
    container_name: pangea-postgres
    environment:
      POSTGRES_USER: pangea
      POSTGRES_PASSWORD: pangea
      POSTGRES_DB: pangea
    ports:
      - "5432:5432"
    volumes:
      - pangea-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pangea -d pangea"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pangea-pgdata: